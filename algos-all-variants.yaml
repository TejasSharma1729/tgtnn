avazu:
  binary-splitting: &id001
    base-args:
    - '@metric'
    constructor: KNNSBinarySplitting
    docker-tag: null
    module: benchmark.algorithms.knns
    run-groups:
      base:
        args:
        - k: '@count'
          use_threading: true
        query-args: '[[{"mode": "batch"}]]'
  cufe:
    base-args:
    - '@metric'
    constructor: LinscanCUFE
    docker-tag: null
    module: neurips23.sparse.cufe.linscan
    run-groups:
      base:
        args:
        - {}
        query-args: '[[{"budget": 1}], [{"budget": 4}], [{"budget": 6}], [{"budget":
          10}]]'
  double-group-testing: &id002
    base-args:
    - '@metric'
    constructor: KNNSDoubleGroupTesting
    docker-tag: null
    module: benchmark.algorithms.knns
    run-groups:
      base:
        args:
        - k: '@count'
          use_threading: true
        query-args: '[[{"mode": "batch"}]]'
  linscan:
    base-args:
    - '@metric'
    constructor: Linscan
    docker-tag: null
    module: neurips23.sparse.linscan.linscan
    run-groups:
      base:
        args:
        - {}
        query-args: '[[{"budget": 1}], [{"budget": 4}], [{"budget": 6}], [{"budget":
          10}]]'
  nle: &id003
    base-args:
    - '@metric'
    constructor: NLE
    docker-tag: neurips23-sparse-nle
    module: neurips23.sparse.nle.nle
    run-groups:
      base:
        args:
        - t1: 32
          t2: 128
        query-args: '[{"k1": 4, "k2": 40, "k3": 1}, {"k1": 4, "k2": 40, "k3": 10},
          {"k1": 4, "k2": 40, "k3": 100}, {"k1": 4, "k2": 40, "k3": 1000}]'
  pyanns:
    base-args:
    - '@metric'
    constructor: Pyanns
    docker-tag: null
    module: neurips23.ood.pyanns.pyanns
    run-groups:
      base:
        args:
        - L: 500
          R: 48
        query-args: '[{"ef": 50}, {"ef": 100}, {"ef": 200}, {"ef": 400}]'
  shnsw: &id004
    base-args:
    - '@metric'
    constructor: SparseHNSW
    docker-tag: null
    module: neurips23.sparse.shnsw.shnsw
    run-groups:
      base:
        args:
        - M: 32
          buildthreads: -1
          efConstruction: 200
        query-args: '[[{"efSearch": 40}], [{"efSearch": 200}], [{"efSearch": 500}],
          [{"efSearch": 1000}]]'
